name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy

      - name: Run black
        run: black --check .

      - name: Run isort
        run: isort --check-only --profile black .

      - name: Run flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: finuser
          POSTGRES_PASSWORD: finpass123
          POSTGRES_DB: financedb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-xdist pytest-timeout httpx
          find microservices -name "requirements.txt" -exec pip install -r {} \;

      - name: Initialize database
        run: |
          export PYTHONPATH="${PYTHONPATH}:${PWD}/microservices"
          python microservices/shared/init_db.py
        env:
          DATABASE_URL: postgresql+asyncpg://finuser:finpass123@localhost:5432/financedb

      - name: Start API Gateway
        run: |
          export PYTHONPATH="${PYTHONPATH}:${PWD}/microservices"
          cd microservices/api-gateway
          nohup python main_secure.py > api.log 2>&1 &
          echo $! > api.pid
        env:
          DATABASE_URL: postgresql+asyncpg://finuser:finpass123@localhost:5432/financedb
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key-for-ci-pipeline-must-be-at-least-64-chars-long
          TRANSACTIONS_URL: http://localhost:8001
          AI_URL: http://localhost:8002
          ENVIRONMENT: test

      - name: Start Transaction Service
        run: |
          export PYTHONPATH="${PYTHONPATH}:${PWD}/microservices"
          cd microservices/transaction-service
          nohup python main_secure.py > transaction.log 2>&1 &
          echo $! > transaction.pid
        env:
          DATABASE_URL: postgresql+asyncpg://finuser:finpass123@localhost:5432/financedb
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key-for-ci-pipeline-must-be-at-least-64-chars-long
          ENVIRONMENT: test

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8000/health 2>/dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "API failed to start"
          cat microservices/api-gateway/api.log
          exit 1

      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=xml --timeout=300
        env:
          PYTHONPATH: ${{ github.workspace }}/microservices:${{ github.workspace }}
          DATABASE_URL: postgresql+asyncpg://finuser:finpass123@localhost:5432/financedb
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key-for-ci-pipeline-must-be-at-least-64-chars-long
          ENVIRONMENT: test
          BASE_URL: http://localhost:8000

      - name: Show API logs on failure
        if: failure()
        run: |
          echo "=== API Gateway Logs ==="
          cat microservices/api-gateway/api.log || echo "No API logs found"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Docker images
        run: |
          docker compose build

      - name: Save Docker images
        run: |
          docker save -o finkernel-images.tar $(docker compose config --images)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: finkernel-images
          path: finkernel-images.tar
          retention-days: 7
