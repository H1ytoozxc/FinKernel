services:
  postgres:
    image: postgres:15-alpine
    container_name: fin_postgres
    environment:
      POSTGRES_USER: finuser
      POSTGRES_PASSWORD: finpass123
      POSTGRES_DB: financedb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finuser -d financedb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - finnet

  redis:
    image: redis:7-alpine
    container_name: fin_redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - finnet

  transactions:
    build:
      context: .
      dockerfile: microservices/transaction-service/Dockerfile
    container_name: fin_transactions
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finnet

  ai:
    build:
      context: .
      dockerfile: microservices/ai-service/Dockerfile
    container_name: fin_ai
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      GROQ_MODEL: ${GROQ_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finnet

  gateway:
    build:
      context: .
      dockerfile: microservices/api-gateway/Dockerfile
    container_name: fin_gateway
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-10080}
      TRANSACTIONS_URL: ${TRANSACTIONS_URL:-http://transactions:8001}
      AI_URL: ${AI_URL:-http://ai:8002}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - transactions
      - ai
    networks:
      - finnet

  celery-worker:
    build:
      context: .
      dockerfile: microservices/celery-worker/Dockerfile
    container_name: fin_celery
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL}
      AI_URL: ${AI_URL:-http://ai:8002}
    depends_on:
      - redis
      - ai
    networks:
      - finnet

  event-listener:
    build:
      context: .
      dockerfile: microservices/celery-worker/Dockerfile
    container_name: fin_listener
    command: python worker.py
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL}
      AI_URL: ${AI_URL:-http://ai:8002}
    depends_on:
      - redis
      - celery-worker
    networks:
      - finnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: fin_frontend
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - finnet

  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: fin_jaeger
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: :9411
      COLLECTOR_OTLP_ENABLED: true
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
    networks:
      - finnet

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: fin_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - finnet

  grafana:
    image: grafana/grafana:10.2.2
    container_name: fin_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - finnet

volumes:
  pgdata:
  prometheus_data:
  grafana_data:

networks:
  finnet:
    driver: bridge
